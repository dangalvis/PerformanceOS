<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic Ecommerce Dashboard</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.filters select {
  background: #1e293b;
  color: white;
  border: none;
  padding: 8px;
  margin-left: 10px;
  border-radius: 6px;
}

/* GRID */
.dashboard {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

.full { grid-column: span 12; }
.third { grid-column: span 4; }

/* KPI */
.kpi {
  font-size: 26px;
  font-weight: 600;
}

.positive { color: #22c55e; }
.warning { color: #facc15; }
.negative { color: #ef4444; }

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  padding:20px;
  border-radius:10px;
  width:80%;
}

</style>
</head>

<body>

<div class="header">
  <h1>🚀 Ecommerce Dashboard</h1>

  <div class="filters">
    <select id="dateFilter">
      <option>Last 7 Days</option>
      <option>Last 30 Days</option>
    </select>

    <select id="campaignFilter">
      <option>All Campaigns</option>
      <option>Prospecting</option>
      <option>Retargeting</option>
    </select>

    <select id="sortFilter">
      <option>Sort by ROAS</option>
      <option>Sort by CPA</option>
    </select>
  </div>
</div>

<div class="dashboard">

<!-- KPI -->
<div class="card third">
  <h3>ROAS</h3>
  <div class="kpi positive">3.4x</div>
</div>

<div class="card third">
  <h3>CPA</h3>
  <div class="kpi">$42</div>
</div>

<div class="card third">
  <h3>Revenue</h3>
  <div class="kpi">$25K</div>
</div>

<!-- CAMPAIGN TABLE -->
<div class="card full" onclick="openModal()">
  <h2>Campaign Performance</h2>
  <table id="campaignTable">
    <thead>
      <tr>
        <th>Campaign</th>
        <th>ROAS</th>
        <th>CPA</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- CHART -->
<div class="card full">
  <h2>ROAS Trend</h2>
  <canvas id="roasChart"></canvas>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Expanded View</h2>
    <canvas id="detailChart"></canvas>
    <br>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

const data = [
  {name:"Prospecting US", roas:2.8, cpa:50},
  {name:"Retargeting", roas:4.5, cpa:30}
];

function renderTable() {
  let tbody = document.querySelector("#campaignTable tbody");
  tbody.innerHTML = "";

  data.forEach(c => {
    tbody.innerHTML += `
      <tr>
        <td>${c.name}</td>
        <td>${c.roas}x</td>
        <td>$${c.cpa}</td>
      </tr>`;
  });
}

renderTable();

/* CHART */
new Chart(document.getElementById("roasChart"), {
  type: 'line',
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri"],
    datasets: [{
      label: "ROAS",
      data: [2.5,3,3.2,3.6,3.4]
    }]
  }
});

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";

  new Chart(document.getElementById("detailChart"), {
    type: 'bar',
    data: {
      labels: ["Campaign A","Campaign B"],
      datasets: [{
        label: "ROAS",
        data: [2.8,4.5]
      }]
    }
  });
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
